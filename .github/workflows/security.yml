name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate SBOM from source tree
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          if-no-files-found: error
          retention-days: 30

  snyk-iac:
    name: Snyk IaC (Terraform + Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Enable with repository variable ENABLE_SNYK=true
    if: ${{ vars.ENABLE_SNYK == 'true' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Snyk IaC test
        uses: snyk/actions/iac@8e119fbb6c251787721d34ba683ed48eba792766 # master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3
        with:
          sarif_file: snyk.sarif

# Nota: el analisis de SonarCloud lo provee la GitHub App de SonarCloud
# conectada al repo, que postea el check "SonarCloud Code Analysis" por su
# cuenta. NO se define un job aca con ese mismo nombre: tener dos checks
# homonimos hacia que el job (skipped por estar gateado off) tapara el FAILURE
# real de la app frente al required check del ruleset, dejando mergear PRs con
# el Quality Gate en rojo. El analisis real es el de la App.
