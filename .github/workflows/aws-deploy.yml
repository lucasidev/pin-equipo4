name: AWS deploy (reusable)

# Reusable: terraform apply del modulo aws. Gated por el environment
# production (aprobacion manual del owner antes de tocar AWS).
on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Tag de imagen a deployar (vacio = latest)'
        type: string
        required: false
        default: ''
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      SSH_PUBLIC_KEY:
        required: true
      ADMIN_PASSWORD:
        required: true
      JWT_SECRET:
        required: true
      REDIS_PASSWORD:
        required: true
      MONGO_ROOT_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Terraform apply (AWS)
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: terraform-aws
      cancel-in-progress: false
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform init (aws)
        run: terraform -chdir=terraform/aws init

      - name: Terraform apply (aws)
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ vars.ADMIN_CIDR }}
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_mongo_root_password: ${{ secrets.MONGO_ROOT_PASSWORD }}
        run: |
          # Si se paso un tag de imagen, deployar esa imagen inmutable; si no,
          # dejar el default del modulo (latest, solo util para el primer deploy).
          if [ -n "${{ inputs.image_tag }}" ]; then
            export TF_VAR_api_image="ghcr.io/lucasidev/pokedex-api:${{ inputs.image_tag }}"
            echo "Deploying image: $TF_VAR_api_image"
          else
            echo "Deploying default image (latest)"
          fi
          terraform -chdir=terraform/aws apply -auto-approve

      - name: Outputs (server URL)
        run: terraform -chdir=terraform/aws output
