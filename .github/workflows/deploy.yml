name: "CI/CD: Infraestructura EC2 con Terraform"

# El pipeline se dispara al hacer push a la rama main o al abrir un Pull Request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Permisos mínimos necesarios para interactuar de forma segura con el repositorio
permissions:
  contents: read
  pull-requests: write

jobs:
  # =========================================================
  # TRABAJO 1: GESTIÓN DE INFRAESTRUCTURA (HashiCorp Terraform)
  # =========================================================
  infraestructura:
    name: "Aprovisionamiento con Terraform"
    runs-on: ubuntu-latest
    
    # Declaramos las variables de entorno para AWS usando los Repository Secrets globales
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"

    steps:
      - name: Clonar código del repositorio
        uses: actions/checkout@v4

      # Usamos la acción oficial de HashiCorp para el semillero
      - name: Instalar y configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0" 

      # Ejecuta la validación de formato usando la ruta de la carpeta terraform/
      - name: Validar formato del código
        run: terraform -chdir=terraform fmt -check

      - name: Inicializar Terraform (Descarga de proveedores)
        run: terraform -chdir=terraform init

      - name: Validar sintaxis de los archivos .tf
        run: terraform -chdir=terraform validate

      # Fase CI: Se ejecuta en Pull Requests para previsualizar los cambios en AWS
      - name: Planificar cambios (Terraform Plan)
        if: github.event_name == 'pull_request'
        run: terraform -chdir=terraform plan

      # Fase CD: Se ejecuta SOLO cuando los cambios se consolidan en la rama main
      - name: Aplicar cambios en AWS (Terraform Apply)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform -chdir=terraform apply -auto-approve

  # =========================================================
  # TRABAJO 2: VERIFICACIÓN Y DESPLIEGUE DE LA APLICACIÓN
  # =========================================================
  despliegue_app:
    name: "Validación de Entorno de Aplicación"
    runs-on: ubuntu-latest
    needs: infraestructura
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Clonar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Protegemos el pipeline de ataques en la cadena de suministro de npm
      - name: Auditoría de seguridad de dependencias
        run: npm audit --audit-level=high

      - name: Instalar dependencias bloqueando postscripts maliciosos
        run: npm ci --ignore-scripts

      # Mensaje informativo para el semillero: El EC2 levantará el contenedor de forma autónoma
      - name: Notificar estado del despliegue
        run: |
          echo "La infraestructura EC2 con Docker ha sido configurada exitosamente por Terraform."
          echo "El script user_data está inicializando la Pokedex API dentro del servidor virtual."
