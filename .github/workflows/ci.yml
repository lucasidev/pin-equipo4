name: CI

# Orchestrator. Encadena la validacion de infra y, segun el evento, los
# workflows reusables de AWS:
#   - push a main      -> validate + deploy (deploy gated por environment)
#   - pull_request     -> validate + plan
#   - workflow_dispatch -> validate + (bootstrap | destroy) segun el input
# El deploy/destroy/bootstrap viven en aws-*.yml (reusables). validate y plan
# quedan inline: validate es un required check del ruleset (su nombre no debe
# cambiar) y plan es liviano.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Accion de infra AWS (manual)'
        type: choice
        options:
          - none
          - bootstrap
          - apply
          - destroy
        default: none
      image_tag:
        description: 'Tag de imagen a deployar (ej. sha-abc1234). Vacio = latest.'
        type: string
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # IMPORTANTE: este nombre es un required status check del ruleset de main.
    # No cambiarlo sin actualizar el ruleset, o los PRs no podran mergearse.
    name: Validate infra (terraform + compose)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive terraform

      - name: Terraform init/validate (local)
        run: |
          terraform -chdir=terraform/local init -backend=false
          terraform -chdir=terraform/local validate

      - name: Terraform validate (aws)
        run: |
          terraform -chdir=terraform/aws init -backend=false
          terraform -chdir=terraform/aws validate

      - name: Validate docker compose
        run: docker compose -f compose/docker-compose.yml config > /dev/null

  plan-aws:
    name: Terraform plan (AWS, optional)
    runs-on: ubuntu-latest
    needs: validate
    # Opt-in en PRs: setear la repo variable ENABLE_AWS_PLAN=true.
    if: ${{ github.event_name == 'pull_request' && vars.ENABLE_AWS_PLAN == 'true' }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform init (aws)
        run: terraform -chdir=terraform/aws init

      - name: Terraform plan (aws)
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ vars.ADMIN_CIDR }}
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_mongo_root_password: ${{ secrets.MONGO_ROOT_PASSWORD }}
        run: terraform -chdir=terraform/aws plan -no-color

  # Detecta si el push toco algo que afecte el deploy (el modulo aws o el
  # compose que la EC2 espeja). Un merge de solo-docs no dispara deploy.
  changes:
    name: Detect infra changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2

      - name: Check changed paths
        id: filter
        env:
          # Por env var (no interpolados en el shell), aunque sean SHAs que
          # genera GitHub: evita el patron de inyeccion de forma consistente.
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          # Que cambio en este push respecto del commit anterior.
          changed="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA" 2>/dev/null || git diff --name-only HEAD~1 HEAD)"
          echo "Changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^terraform/aws/|^compose/docker-compose\.yml$'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "Infra changed -> deploy will be proposed."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No infra change -> skipping deploy."
          fi

  # CD: un push a main que toca la infra propone deploy; el environment
  # production exige aprobacion del owner antes de tocar AWS. Un redeploy sin
  # cambio de infra (ej. tomar una imagen :latest nueva) se dispara a mano con
  # action = apply.
  deploy-aws:
    name: Deploy AWS
    needs: [validate, changes]
    # always() para que el dispatch (donde 'changes' se skipea) no arrastre a
    # este job a skipped; el resultado de validate igual se exige explicito.
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      (
        (github.event_name == 'push' && needs.changes.outputs.deploy == 'true') ||
        (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
      )
    uses: ./.github/workflows/aws-deploy.yml
    with:
      image_tag: ${{ inputs.image_tag || '' }}
    # Pasar solo los secrets que el reusable necesita (no 'inherit').
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}

  # Manual: Actions > CI > Run workflow > action = bootstrap (una vez).
  bootstrap-aws:
    name: Bootstrap AWS state
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'bootstrap' }}
    uses: ./.github/workflows/aws-bootstrap.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

  # Manual: Actions > CI > Run workflow > action = destroy.
  destroy-aws:
    name: Destroy AWS
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}
    uses: ./.github/workflows/aws-destroy.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
