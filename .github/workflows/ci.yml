name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate infra (terraform + compose)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive terraform

      - name: Terraform init (local, no backend)
        run: terraform -chdir=terraform/local init -backend=false

      - name: Terraform validate (local)
        run: terraform -chdir=terraform/local validate

      - name: Validate docker compose
        run: docker compose -f compose/docker-compose.yml config > /dev/null

  plan-aws:
    name: Terraform plan (AWS, optional)
    runs-on: ubuntu-latest
    needs: validate
    # Only runs once the aws module exists and the repo variable opts in.
    if: ${{ vars.ENABLE_AWS_PLAN == 'true' }}
    permissions:
      id-token: write # OIDC role assumption, no static keys
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"

      - name: Configure AWS credentials (OIDC)
        # This job is already gated by vars.ENABLE_AWS_PLAN.
        # If enabled, AWS_ROLE_TO_ASSUME and AWS_REGION must be configured.
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init (aws)
        run: terraform -chdir=terraform/aws init

      - name: Terraform plan (aws)
        run: terraform -chdir=terraform/aws plan -no-color
