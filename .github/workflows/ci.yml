name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================
  # TRABAJO 1: VALIDACIÓN ESTÁTICA
  # =========================================================
  validate:
    name: Validate infra (terraform + compose)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Validar formato del código
        run: terraform -chdir=terraform/aws fmt -check

      - name: Inicializar Terraform (Validación Local)
        run: terraform -chdir=terraform/aws init -backend=false

      # PASO CORREGIDO: Ahora sí es un comentario YAML válido
      - name: Validar sintaxis de los archivos .tf
        run: terraform -chdir=terraform/aws validate

      - name: Validate docker compose
        run: docker compose -f compose/docker-compose.yml config > /dev/null

  # =========================================================
  # TRABAJO 2: PLANIFICACIÓN EN AWS (Fase CI - Pull Requests)
  # =========================================================
  plan-aws:
    name: Terraform plan (AWS)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init (aws)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-east-1"
        run: terraform -chdir=terraform/aws init

      - name: Terraform plan (aws)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-east-1"
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform -chdir=terraform/aws plan -no-color

  # =========================================================
  # TRABAJO 3: DESPLIEGUE EN AWS (Fase CD - Push a Main)
  # =========================================================
  apply-aws:
    name: Terraform apply (AWS)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init (aws)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-east-1"
        run: terraform -chdir=terraform/aws init

      - name: Terraform apply (aws)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: "us-east-1"
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform -chdir=terraform/aws apply -auto-approve
