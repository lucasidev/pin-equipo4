name: CI

# Orchestrator. Encadena la validacion de infra y, segun el evento, los
# workflows reusables de AWS:
#   - push a main      -> validate + deploy (deploy gated por environment)
#   - pull_request     -> validate + plan
#   - workflow_dispatch -> validate + (bootstrap | destroy) segun el input
# El deploy/destroy/bootstrap viven en aws-*.yml (reusables). validate y plan
# quedan inline: validate es un required check del ruleset (su nombre no debe
# cambiar) y plan es liviano.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Accion de infra AWS (manual)'
        type: choice
        options:
          - none
          - bootstrap
          - destroy
        default: none

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # IMPORTANTE: este nombre es un required status check del ruleset de main.
    # No cambiarlo sin actualizar el ruleset, o los PRs no podran mergearse.
    name: Validate infra (terraform + compose)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive terraform

      - name: Terraform init/validate (local)
        run: |
          terraform -chdir=terraform/local init -backend=false
          terraform -chdir=terraform/local validate

      - name: Terraform validate (aws)
        run: |
          terraform -chdir=terraform/aws init -backend=false
          terraform -chdir=terraform/aws validate

      - name: Validate docker compose
        run: docker compose -f compose/docker-compose.yml config > /dev/null

  plan-aws:
    name: Terraform plan (AWS, optional)
    runs-on: ubuntu-latest
    needs: validate
    # Opt-in en PRs: setear la repo variable ENABLE_AWS_PLAN=true.
    if: ${{ github.event_name == 'pull_request' && vars.ENABLE_AWS_PLAN == 'true' }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform init (aws)
        run: terraform -chdir=terraform/aws init

      - name: Terraform plan (aws)
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
          TF_VAR_admin_cidr: ${{ vars.ADMIN_CIDR }}
          TF_VAR_admin_password: ${{ secrets.ADMIN_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_redis_password: ${{ secrets.REDIS_PASSWORD }}
          TF_VAR_mongo_root_password: ${{ secrets.MONGO_ROOT_PASSWORD }}
        run: terraform -chdir=terraform/aws plan -no-color

  # CD: push a main dispara el deploy, pero el environment production exige
  # aprobacion del owner antes de tocar AWS.
  deploy-aws:
    name: Deploy AWS
    needs: validate
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    uses: ./.github/workflows/aws-deploy.yml
    secrets: inherit

  # Manual: Actions > CI > Run workflow > action = bootstrap (una vez).
  bootstrap-aws:
    name: Bootstrap AWS state
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'bootstrap' }}
    uses: ./.github/workflows/aws-bootstrap.yml
    secrets: inherit

  # Manual: Actions > CI > Run workflow > action = destroy.
  destroy-aws:
    name: Destroy AWS
    needs: validate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}
    uses: ./.github/workflows/aws-destroy.yml
    secrets: inherit
